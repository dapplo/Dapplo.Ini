name: Publish Wiki

on:
  push:
    branches:
      - master
    paths:
      - 'docs/wiki/**'

jobs:
  publish-wiki:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Publish docs/wiki to GitHub Wiki
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.wiki.git" wiki
          # Sync docs/wiki/ into the wiki repo (delete pages removed from source)
          rsync -av --delete --exclude='.git' docs/wiki/ wiki/
          cd wiki
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          # Only commit and push when there are actual changes
          if git diff --cached --quiet; then
            echo "No wiki changes to publish."
          else
            git commit -m "docs: sync wiki from docs/wiki (${{ github.sha }})"
            git push
          fi
